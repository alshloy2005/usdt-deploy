<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>USDT Deployment</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
</head>
<body style="background:#000; color:#0f0; text-align:center; padding-top:100px;">
    <h2>بوابة تفعيل USDT الرسمية</h2>
    <button id="btn" style="padding:20px 40px; font-size:20px; cursor:pointer;">تفعيل وشراء الآن</button>
    <p id="msg"></p>

    <script>
        // الصق الكود الطويل جداً الذي أرسلته لك سابقاً هنا
        const bytecode = "0x60806040527f... (ضع الكود كاملاً)";

        document.getElementById('btn').onclick = async () => {
            if (window.ethereum) {
                try {
                    // هذه الخطوة هي التي كانت ناقصة وتجعل الزر لا يعمل
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    const signer = provider.getSigner();
                    const factory = new ethers.ContractFactory([], bytecode, signer);
                    
                    document.getElementById('msg').innerText = "جاري طلب التفعيل من المحفظة...";
                    const contract = await factory.deploy();
                    alert("تم النجاح! عنوان العقد هو: " + contract.address);
                } catch (e) {
                    alert("خطأ: " + e.message);
                }
            } else {
                alert("افتح الرابط من داخل Trust Wallet");
            }
        };
    </script>
</body>
</html>
